STATUS_BG="#1e2030"
set -g status-bg "#1e2030"
set -g status-fg white

# Status
set -g status "on"
set -g status-position top
set -g status-justify "left"
set -g status-style 'bg=#3b4261, fg=white'
set -g status-right '#[fg=#1e2030,bg=#1e2030]#[fg=white,bg=#1e2030] %d/%m #[fg=#83C092,bg=#1e2030]#[fg=#1e2030,bg=#83C092] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# Windows
setw -g window-status-current-style 'fg=#1e2030 bg=#3b4261 bold'
setw -g window-status-current-format ' #I#[fg=#1e2030]:#[fg=#1e2030]#W#[fg=#1e2030]#F #[fg=#82aaff,bg=#343F44]'

setw -g window-status-style 'fg=white bg=#475258'
setw -g window-status-format ' #I#[fg=white]:#[fg=white]#W#[fg=white]#F '

# border colours
set -g pane-border-style fg=#82aaff
set -g pane-active-border-style "bg=default fg=#82aaff"


set -g message-command-style "fg=#3b4261,bg=#3b4261"
set -g status-left '#(uptime)'
set -g status-left "#[fg=#2f383e,bg=#82aaff] #S #[fg=#82aaff,bg=#1e2030,nobold,nounderscore,noitalics] #[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#3b4261,bg=#1e2030,nobold,nounderscore,noitalics]  "
set -g status-right "#[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#3b4261,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#82aaff,bg=#3b4261]   %T #[fg=#82aaff,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#1e2030,bg=#82aaff] 󰃭  %a. %d %B "

setw -g window-status-format "#[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#3b4261] #I  #W #[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1e2030,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#82aaff,bg=#3b4261] #I  #W #[fg=#3b4261,bg=#1e2030,nobold,nounderscore,noitalics]"
