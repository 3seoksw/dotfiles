STATUS_BG="#272e33"
set -g status-bg "#272e33"
set -g status-fg white

# Status
set -g status "on"
set -g status-position top
set -g status-justify "left"
set -g status-style 'bg=#272e33, fg=white'
set -g status-right '#[fg=#3D484D,bg=#343F44]#[fg=white,bg=#3D484D] %d/%m #[fg=#83C092,bg=#3D484D]#[fg=#2D353B,bg=#83C092] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# Windows
setw -g window-status-current-style 'fg=#3D484D bg=#a7c080 bold'
setw -g window-status-current-format ' #I#[fg=#475258]:#[fg=#3D484D]#W#[fg=#56635f]#F #[fg=#a7c080,bg=#343F44]'

setw -g window-status-style 'fg=white bg=#475258'
setw -g window-status-format ' #I#[fg=white]:#[fg=white]#W#[fg=white]#F '

# border colours
set -g pane-border-style fg=#384B55
set -g pane-active-border-style "bg=default fg=#7FBBB3"


set -g message-command-style "fg=#d8caac,bg=#4a555b"
set -g status-left '#(uptime)'
set -g status-left "#[fg=#2f383e,bg=#a7c080] #S #[fg=#a7c080,bg=#272e33,nobold,nounderscore,noitalics] #[fg=#272e33,bg=#272e33,nobold,nounderscore,noitalics]#[fg=#d8caac,bg=#272e33,nobold,nounderscore,noitalics]  "
set -g status-right "#[fg=#272e33,bg=#272e33,nobold,nounderscore,noitalics]#[fg=#4a555b,bg=#272e33,nobold,nounderscore,noitalics]#[fg=#d8caac,bg=#4a555b]   %T #[fg=#a7c080,bg=#4a555b,nobold,nounderscore,noitalics]#[fg=#2f383e,bg=#a7c080] 󰃭  %a. %d %B "

setw -g window-status-format "#[fg=#272e33,bg=#272e33,nobold,nounderscore,noitalics]#[fg=#d8caac] #I  #W #[fg=#272e33,bg=#272e33,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#272e33,bg=#4a555b,nobold,nounderscore,noitalics]#[fg=#d8caac,bg=#4a555b] #I  #W #[fg=#4a555b,bg=#272e33,nobold,nounderscore,noitalics]"
